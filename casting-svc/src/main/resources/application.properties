quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.port=5432
quarkus.hibernate-orm.database.generation=update

# NLP microservice (nlp-svc) — override with nlp.service.url if running on a different port
nlp.service.url=http://localhost:8090

# App base URL — used in outgoing emails; override in production
app.base-url=${APP_BASE_URL:http://localhost:5173}

# Mailer — mock=true logs emails to console instead of sending (default for local dev)
# In production, set MAIL_MOCK=false and configure MAIL_HOST / MAIL_PORT / MAIL_USER / MAIL_PASSWORD
quarkus.mailer.from=Paradies <noreply@paradies.local>
quarkus.mailer.mock=${MAIL_MOCK:true}
quarkus.mailer.host=${MAIL_HOST:localhost}
quarkus.mailer.port=${MAIL_PORT:1025}
